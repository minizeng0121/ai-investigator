<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔍 AI 安全調查員</title>
<style>
  :root {
    --bg:      #071020;
    --accent:  #ff8c00;
    --accent2: #ffb347;
    --green:   #00e676;
    --text:    #ddeeff;
    --dim:     #6a88a8;
    --card:    #081830;
    --border:  rgba(255,140,0,0.45);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh; /* dynamic viewport for mobile */
  }

  /* ─── Status Bar ─── */
  .status-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 16px;
    background: linear-gradient(90deg, #050e1c 0%, #0a1c36 100%);
    border-bottom: 1px solid var(--border);
  }

  .status-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .status-student {
    flex: 1;
    font-size: 12px;
    color: var(--dim);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: rgba(255,140,0,0.08);
    color: var(--accent2);
    white-space: nowrap;
  }

  /* ─── Scene Wrapper ─── */
  .scene-wrapper {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    min-height: 0;
    background: #020810;
  }

  /* ─── Scene Container ─── */
  /* Aspect ratio matches image: 2760 × 1504 ≈ 1.835 */
  .scene-container {
    position: relative;
    aspect-ratio: 2760 / 1504;
    max-width: 100%;
    max-height: 100%;
    /* Also constrain by width on tall screens */
    width: min(100%, calc(100dvh * 1.835 - 120px));
  }

  .scene-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 4px;
  }

  /* HUD scan-line overlay for sci-fi feel */
  .scene-container::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,40,80,0.04) 3px,
      rgba(0,40,80,0.04) 4px
    );
    pointer-events: none;
    border-radius: 4px;
  }

  /* Corner HUD brackets */
  .hud-corner {
    position: absolute;
    width: 22px;
    height: 22px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.7;
    pointer-events: none;
  }
  .hud-tl { top:8px; left:8px;  border-width: 2px 0 0 2px; }
  .hud-tr { top:8px; right:8px; border-width: 2px 2px 0 0; }
  .hud-bl { bottom:8px; left:8px;  border-width: 0 0 2px 2px; }
  .hud-br { bottom:8px; right:8px; border-width: 0 2px 2px 0; }

  /* ─── Hotspots ─── */
  .hotspot {
    position: absolute;
    width: clamp(38px, 5vw, 54px);
    height: clamp(38px, 5vw, 54px);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10, 20, 40, 0.55);
    border: 2px solid var(--accent);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(16px, 2.2vw, 24px);
    cursor: pointer;
    animation: pulse 2.8s infinite;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
    z-index: 10;
  }

  .hotspot:active { transform: translate(-50%,-50%) scale(0.92); }

  .hotspot.collected {
    background: rgba(0,60,30,0.65);
    border-color: var(--green);
    box-shadow: 0 0 16px rgba(0,230,118,0.55);
    animation: none;
  }

  /* label under each hotspot */
  .hotspot-label {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    white-space: nowrap;
    color: rgba(255,220,150,0.85);
    pointer-events: none;
    letter-spacing: 0.5px;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,140,0,0.55); }
    50%      { box-shadow: 0 0 0 10px rgba(255,140,0,0); }
  }

  /* ─── Progress Bar ─── */
  .progress-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    background: linear-gradient(90deg, #050e1c 0%, #0a1c36 100%);
    border-top: 1px solid var(--border);
  }

  .progress-label {
    font-size: 12px;
    color: var(--dim);
    white-space: nowrap;
  }

  .dots { display: flex; gap: 5px; }

  .dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 1.5px solid var(--dim);
    transition: all 0.35s;
  }

  .dot.filled {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 7px rgba(0,230,118,0.65);
  }

  .progress-text {
    flex: 1;
    font-size: 12px;
    color: var(--dim);
    transition: color 0.3s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-next {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    opacity: 0.3;
    pointer-events: none;
    font-family: inherit;
    transition: opacity 0.3s, background 0.3s, color 0.3s, transform 0.2s;
    white-space: nowrap;
  }

  .btn-next.active {
    opacity: 1;
    pointer-events: all;
    background: var(--accent);
    color: #000;
  }

  .btn-next.active:hover  { transform: scale(1.05); }
  .btn-next.active:active { transform: scale(0.97); }

  /* ─── Evidence Modal ─── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,5,15,0.78);
    z-index: 400;
    justify-content: center;
    align-items: center;
    padding: 16px;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  .overlay.open { display: flex; }

  .ev-card {
    position: relative;
    background: linear-gradient(160deg, #0b1f3a, #061528);
    border: 1px solid rgba(255,140,0,0.6);
    border-radius: 20px;
    padding: 26px 22px 22px;
    max-width: 420px;
    width: 100%;
    box-shadow:
      0 0 60px rgba(255,140,0,0.12),
      inset 0 1px 0 rgba(255,255,255,0.05);
    animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes slideUp {
    from { transform: translateY(32px) scale(0.95); opacity: 0; }
    to   { transform: translateY(0)    scale(1);    opacity: 1; }
  }

  /* Top accent line */
  .ev-card::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px;
  }

  .ev-close {
    position: absolute;
    top: 12px; right: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    width: 28px; height: 28px;
    color: var(--dim);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .ev-close:hover { background: rgba(255,255,255,0.12); }

  .ev-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(255,140,0,0.1);
    border: 1px solid rgba(255,140,0,0.3);
    border-radius: 20px;
    padding: 2px 10px;
    margin-bottom: 12px;
  }

  .ev-icon { font-size: 32px; display: block; margin-bottom: 8px; }

  .ev-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 14px;
    line-height: 1.3;
  }

  .ev-body {
    font-size: 15px;
    line-height: 1.8;
    color: #c8d8e8;
    background: rgba(255,255,255,0.04);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin-bottom: 18px;
  }

  .ev-body em {
    color: var(--accent2);
    font-style: normal;
    font-weight: 600;
  }

  .ev-body strong {
    color: #fff;
  }

  .btn-collect {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #0f5a30 0%, #00a854 100%);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.5px;
    transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
    box-shadow: 0 4px 16px rgba(0,168,84,0.25);
  }

  .btn-collect:hover:not(.done) {
    transform: scale(1.02);
    box-shadow: 0 6px 22px rgba(0,168,84,0.4);
  }

  .btn-collect:active:not(.done) { transform: scale(0.98); }

  .btn-collect.done {
    background: linear-gradient(135deg, #0d2a1a, #0d2a1a);
    color: #3a7a50;
    cursor: default;
    box-shadow: none;
  }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 74px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(0,40,20,0.95);
    border: 1px solid var(--green);
    border-radius: 30px;
    padding: 9px 22px;
    font-size: 13px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.28s, transform 0.28s;
    pointer-events: none;
    z-index: 500;
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Login Screen ─── */
  #screen-login {
    position: fixed;
    inset: 0;
    z-index: 900;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    /* animated grid background */
    background-image:
      linear-gradient(rgba(255,140,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,140,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  #screen-login.hidden {
    display: none;
  }

  .login-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 16px;
    background: rgba(255,140,0,0.06);
  }

  .login-title {
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .login-subtitle {
    font-size: 14px;
    color: var(--dim);
    line-height: 1.6;
  }

  .login-card {
    background: linear-gradient(160deg, #0b1f3a, #061528);
    border: 1px solid rgba(255,140,0,0.45);
    border-radius: 20px;
    padding: 28px 28px 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 0 60px rgba(255,140,0,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    animation: slideUp 0.4s cubic-bezier(0.34,1.2,0.64,1);
  }

  /* top glow line */
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 24px; right: 24px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 7px;
  }

  .form-control {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 14px;
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .form-control:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,140,0,0.15);
  }

  /* Dropdown arrow */
  .form-select-wrap {
    position: relative;
  }
  .form-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    pointer-events: none;
    font-size: 14px;
  }
  .form-select-wrap .form-control {
    padding-right: 36px;
    cursor: pointer;
  }

  /* Style dropdown options (limited browser support, best-effort) */
  .form-control option {
    background: #0d2040;
    color: #fff;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .btn-start {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #c85a00, #ff8c00, #ffaa30);
    background-size: 200% 200%;
    animation: shimmer 3s infinite;
    color: #000;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(255,140,0,0.35);
  }

  .btn-start:hover  { transform: scale(1.02); box-shadow: 0 6px 28px rgba(255,140,0,0.5); }
  .btn-start:active { transform: scale(0.97); }

  @keyframes shimmer {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  .form-error {
    font-size: 12px;
    color: #ff6b6b;
    margin-top: 6px;
    display: none;
  }
  .form-error.show { display: block; }

  /* screen-main starts hidden, fades in after login */
  #screen-main {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #screen-main.visible { opacity: 1; }

  /* ─── Classification Screen ─── */
  #screen-classify {
    position: fixed;
    inset: 0;
    z-index: 800;
    background: var(--bg);
    display: none;
    flex-direction: column;
    height: 100dvh;
  }
  #screen-classify.visible { display: flex; }

  .classify-status {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 16px;
    background: linear-gradient(90deg, #050e1c, #0a1c36);
    border-bottom: 1px solid var(--border);
  }

  .classify-instruction {
    flex-shrink: 0;
    text-align: center;
    padding: 10px 16px 8px;
    font-size: 13px;
    color: var(--dim);
    background: rgba(255,140,0,0.04);
    border-bottom: 1px solid rgba(255,140,0,0.1);
  }
  .classify-instruction strong { color: var(--accent2); }

  /* Pool: unclassified cards row */
  .cards-pool {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    min-height: 110px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px dashed rgba(255,140,0,0.2);
    background: rgba(255,255,255,0.02);
  }
  .cards-pool-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
    width: 100%;
    margin-bottom: 2px;
  }
  .pool-empty-hint {
    font-size: 13px;
    color: rgba(255,255,255,0.2);
    font-style: italic;
  }

  /* Drop zones */
  .classify-zones {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px 16px;
    min-height: 0;
  }

  .drop-zone {
    border: 2px dashed;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .drop-zone.against {
    border-color: rgba(255,80,60,0.45);
    background: rgba(255,60,40,0.05);
  }
  .drop-zone.for {
    border-color: rgba(0,200,100,0.45);
    background: rgba(0,200,100,0.05);
  }
  .drop-zone.drag-over.against {
    background: rgba(255,60,40,0.14);
    border-color: rgba(255,80,60,0.9);
    box-shadow: inset 0 0 24px rgba(255,60,40,0.12);
  }
  .drop-zone.drag-over.for {
    background: rgba(0,200,100,0.14);
    border-color: rgba(0,200,100,0.9);
    box-shadow: inset 0 0 24px rgba(0,200,100,0.12);
  }

  .zone-header {
    flex-shrink: 0;
    padding: 10px 14px 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .drop-zone.against .zone-header { color: #ff6b5a; }
  .drop-zone.for     .zone-header { color: #3ddc84; }

  .zone-cards {
    flex: 1;
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
    overflow-y: auto;
  }

  /* Evidence mini-card (draggable) */
  .ev-mini-card {
    background: linear-gradient(135deg, #0e2040, #0a1830);
    border: 1px solid rgba(255,140,0,0.3);
    border-radius: 10px;
    padding: 9px 12px;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    min-width: 130px;
    max-width: 180px;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    position: relative;
  }
  .ev-mini-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(255,140,0,0.2);
    border-color: rgba(255,140,0,0.6);
  }
  .ev-mini-card:active { cursor: grabbing; }
  .ev-mini-card.dragging { opacity: 0.35; transform: scale(0.97); }

  .ev-mini-icon { font-size: 20px; flex-shrink: 0; line-height: 1.2; }
  .ev-mini-text { flex: 1; min-width: 0; }
  .ev-mini-title {
    font-size: 12px;
    font-weight: 700;
    color: #ddeeff;
    line-height: 1.3;
    margin-bottom: 2px;
  }
  .ev-mini-sub {
    font-size: 10px;
    color: var(--dim);
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* ─── Card Tooltip ─── */
  #card-tooltip {
    position: fixed;
    z-index: 9990;
    background: linear-gradient(160deg, #0b1f3a, #061528);
    border: 1px solid rgba(255,140,0,0.65);
    border-radius: 14px;
    padding: 14px 16px;
    max-width: 270px;
    width: max-content;
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px) scale(0.97);
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 12px 40px rgba(0,0,0,0.55), 0 0 30px rgba(255,140,0,0.1);
  }
  #card-tooltip::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px;
  }
  #card-tooltip.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .tip-tag {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .tip-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }
  .tip-body {
    font-size: 13px;
    line-height: 1.7;
    color: #c8d8e8;
    border-left: 2px solid var(--accent);
    padding-left: 10px;
  }
  .tip-body em  { color: var(--accent2); font-style: normal; font-weight: 600; }
  .tip-hint {
    font-size: 10px;
    color: var(--dim);
    margin-top: 10px;
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* Long-press ring animation on card */
  .ev-mini-card.pressing::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 13px;
    border: 2px solid var(--accent);
    animation: pressRing 0.5s linear forwards;
  }
  @keyframes pressRing {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }

  /* Ghost card (follows pointer while dragging) */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.9;
    transform: scale(1.06) rotate(2deg);
    transition: transform 0.1s;

  /* Classify progress bar */
  .classify-progress {
    flex-shrink: 0;

    gap: 10px;

  .btn-back:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ─── Responsive tweaks ─── */
  @media (max-width: 480px) {
    .status-bar { padding: 8px 12px; }
    .progress-bar { padding: 8px 12px; gap: 8px; }
    .btn-next { padding: 6px 12px; font-size: 12px; }

  @media (orientation: portrait) and (max-width: 768px) {

      width: 100%;
      aspect-ratio: 2816 / 1536;
      max-height: unset;
    }

  }
</style>

<script>
// ─────────────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────────────
function startMission() {
  const cls  = document.getElementById('input-class').value.trim();
  const seat = document.getElementById('input-seat').value.trim();
  const name = document.getElementById('input-name').value.trim();
  const err  = document.getElementById('form-error');

  if (!cls || !seat || !name) {
    err.classList.add('show');
    return;
  }
  err.classList.remove('show');

  // Store student info
  const student = { cls, seat, name };
  sessionStorage.setItem('student', JSON.stringify(student));

  // Update status bar label
  document.getElementById('student-label').textContent =
    `🕵️ ${cls} ${seat}號 ${name}`;

  // Transition: hide login, show main
  document.getElementById('screen-login').classList.add('hidden');
  const main = document.getElementById('screen-main');
  main.style.display = 'flex';
  // Trigger fade-in on next frame
  requestAnimationFrame(() => requestAnimationFrame(() => {
    main.classList.add('visible');
  }));
}

// Allow Enter key to submit login
['input-class','input-seat','input-name'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => {
    if (e.key === 'Enter') startMission();
  });
});

// ─────────────────────────────────────────────────────
// Evidence data  (5 items, each linked to a hotspot)
// ─────────────────────────────────────────────────────
const EVIDENCES = [
  {
    // hs-0: 車頂感測器 (🔵) — top sensor camera
    icon:  '🔵',
    tag:   'AI 感測器數據',
    title: '光達感測報告',
    body:  'Waymo 車頂的光達可以看到<em>三個足球場</em>那麼遠的距離！它確實有看到旁邊那輛大車。但是 AI 以為大車旁邊<em>不會有人突然跑出來</em>，所以沒有提早放慢速度。結果小朋友一出現，AI 來不及完全停下來。'
  },
  {
    // hs-1: 路口標示 (🚧) — speed sign
    icon:  '🚧',
    tag:   '法規對照',
    title: '路口速限規定',
    body:  '這裡離學校門口只有 <em>15 公尺</em>，法律規定這個範圍內車速<em>不能超過時速 25 公里</em>。Waymo 當時的速度是 <em>27 公里</em>。'
  },
  {
    // hs-2: 受傷位置 (🤕) — child figure
    icon:  '🤕',
    tag:   '目擊者證詞',
    title: '現場目擊紀錄',
    body:  '目擊者小明的媽媽說：「我看到那台白色車子<em>有閃一下</em>，但還是撞到了孩子。」<br><br>小朋友當時背著書包，<strong>從右邊的大車後方突然跑出來</strong>。'
  },
  {
    // hs-3: 車速紀錄 (🚗) — Waymo dashboard
    icon:  '🚗',
    tag:   'AI 感測器數據',
    title: '煞車紀錄',
    body:  '車上的紀錄器顯示，AI 發現小朋友時，車速是 <em>27 公里</em>，它<strong>馬上煞車</strong>，撞到的時候速度已經降到 <em>10 公里</em>。'
  },
  {
    // hs-4: 監視器 (📹) — overhead inset map
    icon:  '📹',
    tag:   '影像紀錄',
    title: '監視器畫面',
    body:  '監視器畫面顯示，小朋友從一輛停著的大車（SUV）後面<em>突然跑出來</em>，從出現到被撞，<em>不到半秒鐘</em>。'
  }
];

// ─────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────
const collected = new Set();
let currentId   = null;

// main screen starts hidden (login screen shows first)
document.getElementById('screen-main').style.display = 'none';

// ─────────────────────────────────────────────────────
// Open evidence card
// ─────────────────────────────────────────────────────
function openEvidence(id) {
  currentId = id;
  const e = EVIDENCES[id];

  document.getElementById('ev-tag').textContent   = e.tag;
  document.getElementById('ev-icon').textContent  = e.icon;
  document.getElementById('ev-title').textContent = e.title;
  document.getElementById('ev-body').innerHTML    = e.body;

  const btn = document.getElementById('btn-collect');
  if (collected.has(id)) {
    btn.textContent = '✅ 已收入調查資料夾';
    btn.className   = 'btn-collect done';
  } else {
    btn.textContent = '✅ 收下這張證據';
    btn.className   = 'btn-collect';
  }

  document.getElementById('overlay').classList.add('open');
}

// ─────────────────────────────────────────────────────
// Collect evidence
// ─────────────────────────────────────────────────────
function collectEvidence() {
  if (currentId === null || collected.has(currentId)) return;

  collected.add(currentId);

  document.getElementById('hs-' + currentId).classList.add('collected');
  document.getElementById('d'  + currentId).classList.add('filled');

  const btn = document.getElementById('btn-collect');
  btn.textContent = '✅ 已收入調查資料夾';
  btn.className   = 'btn-collect done';

  updateProgress();
  showToast('📁 證據已加入調查資料夾！');
  setTimeout(closeModal, 800);
}

// ─────────────────────────────────────────────────────
// Progress
// ─────────────────────────────────────────────────────
function updateProgress() {
  const n    = collected.size;
  const pEl  = document.getElementById('ptext');
  const bEl  = document.getElementById('btn-next');

  if (n >= 5) {
    pEl.textContent = '🎉 5 張全部找到了！';
    pEl.style.color = 'var(--green)';
  } else if (n >= 3) {
    pEl.textContent = `已蒐集 ${n} 張，可繼續或再找找看`;
    pEl.style.color = 'var(--accent2)';
  } else {
    pEl.textContent = `再找 ${3 - n} 張就能繼續`;
    pEl.style.color = '';
  }

  if (n >= 3) bEl.classList.add('active');
}

// ─────────────────────────────────────────────────────
// Modal helpers
// ─────────────────────────────────────────────────────
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  currentId = null;
}

function closeOutside(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

// ─────────────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─────────────────────────────────────────────────────
// Next step → Classification screen
// ─────────────────────────────────────────────────────
function goNext() {
  if (collected.size < 3) return;
  buildClassifyScreen();
  document.getElementById('screen-main').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('screen-main').style.display = 'none';
    document.getElementById('screen-classify').classList.add('visible');
  }, 350);
}

// ═════════════════════════════════════════════════════
// CLASSIFICATION SCREEN
// ═════════════════════════════════════════════════════

// Track where each card lives: 'pool' | 'against' | 'for'
const cardZone = {};   // cardId → zone string

function buildClassifyScreen() {
  // Update student label
  const s = JSON.parse(sessionStorage.getItem('student') || '{}');
  document.getElementById('classify-student-label').textContent =
    `🕵️ ${s.cls || ''} ${s.seat || ''}號 ${s.name || ''}`;

  // Build cards only for collected evidence
  const pool = document.getElementById('cards-pool');
  // Remove old cards (keep the label)
  pool.querySelectorAll('.ev-mini-card').forEach(c => c.remove());

  collected.forEach(id => {
    cardZone[id] = 'pool';
    const card = makeCard(id);
    pool.appendChild(card);
  });

  updateClassifyProgress();
}

function makeCard(id) {
  const e = EVIDENCES[id];
  const div = document.createElement('div');
  div.className = 'ev-mini-card';
  div.dataset.id = id;
  div.innerHTML = `
    <span class="ev-mini-icon">${e.icon}</span>
    <div class="ev-mini-text">
      <div class="ev-mini-title">${e.title}</div>
      <div class="ev-mini-sub">${e.tag}</div>
    </div>`;

  div.addEventListener('pointerdown', onPointerDown);
  addHoverListeners(div, id); // desktop hover tooltip
  return div;
}

// ─────────────────────────────────────────────────────
// Tooltip logic
// ─────────────────────────────────────────────────────
const tooltip    = document.getElementById('card-tooltip');
let   tipVisible = false;
let   tipHideTimer = null;
const isTouchDevice = () => window.matchMedia('(pointer: coarse)').matches;

function showTooltip(id, anchorRect) {
  const e = EVIDENCES[id];
  document.getElementById('tip-tag').textContent  = e.tag;
  document.getElementById('tip-title').textContent = e.title;
  document.getElementById('tip-body').innerHTML    = e.body;
  document.getElementById('tip-hint').style.display =
    isTouchDevice() ? '' : 'none';

  tooltip.classList.add('show');
  tipVisible = true;

  // Position: prefer above the card, clamp to viewport
  const margin = 12;
  const tw = 280;
  let left = anchorRect.left + anchorRect.width / 2 - tw / 2;
  left = Math.max(margin, Math.min(left, window.innerWidth - tw - margin));

  let top = anchorRect.top - tooltip.offsetHeight - 12;
  if (top < margin) top = anchorRect.bottom + 10; // flip below if no room

  tooltip.style.left  = left + 'px';
  tooltip.style.top   = top  + 'px';
  tooltip.style.width = tw   + 'px';
}

function hideTooltip(delay = 0) {
  clearTimeout(tipHideTimer);
  if (delay > 0) {
    tipHideTimer = setTimeout(() => {
      tooltip.classList.remove('show');
      tipVisible = false;
    }, delay);
  } else {
    tooltip.classList.remove('show');
    tipVisible = false;
  }
}

// Desktop: hover
function addHoverListeners(card, id) {
  card.addEventListener('mouseenter', () => {
    if (dragging) return;
    clearTimeout(tipHideTimer);
    showTooltip(id, card.getBoundingClientRect());
  });
  card.addEventListener('mouseleave', () => hideTooltip(200));
}

// ─────────────────────────────────────────────────────
// Drag logic — tap=tooltip, long-press=drag (touch)
//              hover=tooltip, mousedown=drag (mouse)
// ─────────────────────────────────────────────────────
let dragging       = null;
let ghost          = null;
let dragOffX       = 0;
let dragOffY       = 0;
let pressTimer     = null;  // long-press threshold
let pressCancelled = false; // true once drag starts

const LONG_PRESS_MS = 450;

function onPointerDown(e) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();

  const card = e.currentTarget;
  pressCancelled = false;
  hideTooltip();

  if (isTouchDevice()) {
    // Touch: wait LONG_PRESS_MS before starting drag
    card.classList.add('pressing');
    pressTimer = setTimeout(() => {
      card.classList.remove('pressing');
      pressCancelled = true; // drag mode
      startDrag(e, card);
    }, LONG_PRESS_MS);

    card.addEventListener('pointerup',    onTapUp,    { once: true });
    card.addEventListener('pointercancel', onTapCancel,{ once: true });
    card.addEventListener('pointermove',  onTapMove);
  } else {
    // Mouse: drag immediately
    startDrag(e, card);
  }
}

// Touch: released before long press → show tooltip
function onTapUp(e) {
  clearTimeout(pressTimer);
  e.currentTarget.classList.remove('pressing');
  e.currentTarget.removeEventListener('pointermove', onTapMove);
  if (!pressCancelled) showTooltip(
    parseInt(e.currentTarget.dataset.id),
    e.currentTarget.getBoundingClientRect()
  );
  // hide tooltip after 3s
  hideTooltip(3000);
}

function onTapCancel(e) {
  clearTimeout(pressTimer);
  e.currentTarget.classList.remove('pressing');
  e.currentTarget.removeEventListener('pointermove', onTapMove);
}

// Cancel long-press if finger moves too much
function onTapMove(e) {
  clearTimeout(pressTimer);
  e.currentTarget.classList.remove('pressing');
  e.currentTarget.removeEventListener('pointermove', onTapMove);
  e.currentTarget.removeEventListener('pointerup', onTapUp);
  // start drag immediately on significant move
  if (!pressCancelled) {
    pressCancelled = true;
    startDrag(e, e.currentTarget);
  }
}

// ── Actual drag start ──
function startDrag(e, card) {
  hideTooltip();
  dragging = card;
  dragging.classList.add('dragging');
  dragging.setPointerCapture(e.pointerId);

  ghost = document.getElementById('drag-ghost');
  ghost.innerHTML  = dragging.innerHTML;
  ghost.className  = 'ev-mini-card';
  ghost.id         = 'drag-ghost';
  ghost.style.display = 'block';
  ghost.style.width   = dragging.offsetWidth + 'px';

  const rect = dragging.getBoundingClientRect();
  dragOffX = e.clientX - rect.left;
  dragOffY = e.clientY - rect.top;
  moveGhost(e.clientX, e.clientY);

  dragging.addEventListener('pointermove', onPointerMove);
  dragging.addEventListener('pointerup',   onPointerUp);
  dragging.addEventListener('pointercancel', onPointerUp);
}

function onPointerMove(e) {
  e.preventDefault();
  moveGhost(e.clientX, e.clientY);

  // Highlight zone under ghost centre
  const cx = e.clientX;
  const cy = e.clientY;
  ghost.style.display = 'none';
  const under = document.elementFromPoint(cx, cy);
  ghost.style.display = 'block';

  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
  const zone = under?.closest('.drop-zone');
  if (zone) zone.classList.add('drag-over');

  // Also check pool
  const pool = under?.closest('.cards-pool');
  if (pool) pool.style.background = 'rgba(255,140,0,0.06)';
  else      document.getElementById('cards-pool').style.background = '';
}

function onPointerUp(e) {
  dragging.removeEventListener('pointermove', onPointerMove);
  dragging.removeEventListener('pointerup',   onPointerUp);
  dragging.removeEventListener('pointercancel', onPointerUp);

  ghost.style.display = 'none';
  dragging.classList.remove('dragging');
  hideTooltip();
  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
  document.getElementById('cards-pool').style.background = '';

  // Detect drop target
  const cx = e.clientX, cy = e.clientY;
  const under = document.elementFromPoint(cx, cy);
  const zone  = under?.closest('.drop-zone');
  const pool  = under?.closest('.cards-pool');

  if (zone) {
    placeCard(dragging, zone.dataset.zone);
  } else if (pool) {
    placeCard(dragging, 'pool');
  }
  // if dropped nowhere → stay put (no change)

  dragging = null;
}

function moveGhost(x, y) {
  ghost.style.left = (x - dragOffX) + 'px';
  ghost.style.top  = (y - dragOffY) + 'px';
}

// ─────────────────────────────────────────────────────
// Place card in a zone
// ─────────────────────────────────────────────────────
function placeCard(cardEl, zoneName) {
  const id = parseInt(cardEl.dataset.id);
  cardZone[id] = zoneName;

  let container;
  if (zoneName === 'pool') {
    container = document.getElementById('cards-pool');
  } else if (zoneName === 'against') {
    container = document.getElementById('zone-against-cards');
  } else {
    container = document.getElementById('zone-for-cards');
  }

  // Re-attach to new container (re-binds are not needed — pointer listener is on element)
  container.appendChild(cardEl);
  updateClassifyProgress();
}

// ─────────────────────────────────────────────────────
// Progress
// ─────────────────────────────────────────────────────
function updateClassifyProgress() {
  const total      = collected.size;
  const classified = Object.values(cardZone).filter(z => z !== 'pool').length;
  const countEl    = document.getElementById('classify-count');
  const btnDone    = document.getElementById('btn-classify-done');

  if (classified === 0) {
    countEl.textContent = '把證據卡拖進下方兩個區域';
    countEl.style.color = '';
  } else if (classified < total) {
    countEl.textContent = `已分類 ${classified} / ${total} 張`;
    countEl.style.color = 'var(--accent2)';
  } else {
    countEl.textContent = `✅ 全部 ${total} 張都分類完成！`;
    countEl.style.color = 'var(--green)';
  }

  // Enable done button when at least 1 card in each zone (or all classified)
  const hasAgainst = Object.values(cardZone).includes('against');
  const hasFor     = Object.values(cardZone).includes('for');
  if (classified >= 3 && hasAgainst && hasFor) {
    btnDone.classList.add('active');
  } else {
    btnDone.classList.remove('active');
  }
}

// ─────────────────────────────────────────────────────
// Back to evidence scene
// ─────────────────────────────────────────────────────
function backToScene() {
  document.getElementById('screen-classify').classList.remove('visible');
  const main = document.getElementById('screen-main');
  main.style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    main.style.opacity = '1';
    main.classList.add('visible');
  }));
}

// ─────────────────────────────────────────────────────
// 班級名稱 → 數字代碼
// ─────────────────────────────────────────────────────
const CLASS_CODE = {
  '五年一班': '501', '五年二班': '502', '五年三班': '503',
  '五年四班': '504', '五年五班': '505', '五年六班': '506',
  '五年七班': '507'
};

// ─────────────────────────────────────────────────────
// Finish classification → Google Form (pre-filled)
// ─────────────────────────────────────────────────────
const FORM_BASE = 'https://docs.google.com/forms/d/e/1FAIpQLSea01DpuxIgY1VV7czsrBdJqFNfSzkvx7l2CG9NSW7pwRGNbg/viewform';
const ENTRY = {
  class: 'entry.575364751',   // 班級
  seat:  'entry.1829482911',  // 座號
  name:  'entry.1383963262',  // 姓名
};

function finishClassify() {
  const btnDone = document.getElementById('btn-classify-done');
  if (!btnDone.classList.contains('active')) return;

  const s = JSON.parse(sessionStorage.getItem('student') || '{}');

  // Build pre-filled form URL
  const params = new URLSearchParams({
    [ENTRY.class]: CLASS_CODE[s.cls] || s.cls,
    [ENTRY.seat]:  s.seat,
    [ENTRY.name]:  s.name,
  });

  const formUrl = `${FORM_BASE}?${params.toString()}`;

  // Log behavior before leaving
  const result = {
    class:   s.cls,
    seat:    s.seat,
    name:    s.name,
    against: Object.entries(cardZone)
               .filter(([,z]) => z === 'against')
               .map(([i]) => EVIDENCES[i].title),
    for:     Object.entries(cardZone)
               .filter(([,z]) => z === 'for')
               .map(([i]) => EVIDENCES[i].title),
    ts:      new Date().toISOString()
  };
  console.log('📊 Classification behavior:', result);

  // Open Google Form in new tab
  window.open(formUrl, '_blank');
}

// ─────────────────────────────────────────────────────
// Keyboard: Escape closes modal
// ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
